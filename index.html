<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍳 يا معلم - مساعد الطبخ المصري</title>

  <style>
    :root { --primary: #5a4fcf; }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 1420px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      height: calc(100vh - 30px);
    }

    @media (max-width: 992px) {
      .container { grid-template-columns: 1fr; }
    }

    .panel {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
    }

    h1 { color: var(--primary); font-size: 28px; }
    .subtitle { color: #666; font-size: 15px; }

    .tabs {
      display: flex;
      background: #f1f1f1;
    }
    .tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      background: white;
      color: var(--primary);
      border-bottom: 4px solid var(--primary);
    }

    .search-box {
      padding: 20px;
      display: flex;
      gap: 10px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
    }

    .recipes-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px;
    }

    .recipe-item {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border-right: 5px solid var(--primary);
    }
    .recipe-item:hover {
      transform: translateX(-6px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .recipe-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 16px;
      padding: 13px 17px;
      border-radius: 14px;
      max-width: 85%;
      line-height: 1.65;
    }

    .user-message {
      background: var(--primary);
      color: white;
      margin-left: auto;
    }

    .bot-message {
      background: white;
      color: #333;
      margin-right: auto;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    .chat-input-area {
      padding: 15px;
      background: white;
      border-top: 1px solid #eee;
    }

    .chat-input-area input {
      width: 100%;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
    }

    .loading, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- الجانب الأيسر -->
  <div class="panel">
    <div class="header">
      <h1>🍳 يا معلم</h1>
      <p class="subtitle">مساعد الطبخ المصري</p>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث عن وصفة أو مكون..." 
             onkeyup="App.Search.handle(event)">
    </div>

    <div class="recipes-list" id="recipesList">
      <div class="loading">جاري تحميل الوصفات...</div>
    </div>
  </div>

  <!-- الجانب الأيمن -->
  <div class="panel">
    <div class="tabs">
      <div class="tab active" onclick="App.UI.switchTab(0)">📖 تفاصيل الوصفة</div>
      <div class="tab" onclick="App.UI.switchTab(1)">🤖 يا معلم</div>
    </div>

    <div id="detailsPanel" class="recipe-details-content"></div>

    <div id="chatPanel" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="اكتب رسالتك يا صاحبي..." 
               onkeypress="if(event.key==='Enter') App.Chat.send()">
      </div>
    </div>
  </div>
</div>

<script>
// ======================= الإصدار 7.1 - محسن ومصحح =======================

const App = {
  version: "7.1.0",
  recipes: [],
  currentRecipe: null,
  currentTab: 0,

  CONFIG: {
    DATA_KEY: "recipesData_v7",
    VERSION_KEY: "dataVersion",
    LAST_UPDATE_KEY: "lastDataUpdate",
    REMOTE_URL: "https://raw.githubusercontent.com/lordxy8-oss/my-info-offline/main/recipes.json",
    UPDATE_INTERVAL: 7 * 24 * 60 * 60 * 1000   // أسبوع
  },

  // ======================= Data Layer (Smart + Safe) =======================
  Data: {
    async init() {
      // تحميل فوري من الكاش
      const cached = this.loadCache();
      if (cached && cached.recipes) {
        App.recipes = cached.recipes;
        App.UI.renderRecipes(App.recipes);
      } else {
        document.getElementById("recipesList").innerHTML = `<div class="loading">جاري تحميل الوصفات من GitHub...</div>`;
      }

      // تحقق من التحديث في الخلفية
      setTimeout(() => this.checkForUpdate(), 1500);
    },

    loadCache() {
      try {
        const str = localStorage.getItem(App.CONFIG.DATA_KEY);
        return str ? JSON.parse(str) : null;
      } catch (e) {
        console.error("خطأ في الكاش:", e);
        return null;
      }
    },

    async checkForUpdate() {
      try {
        const res = await fetch(App.CONFIG.REMOTE_URL + "?t=" + Date.now());
        if (!res.ok) return;

        const remoteData = await res.json();
        const remoteVersion = remoteData.version || 0;

        const localData = this.loadCache();
        const localVersion = localData ? (localData.version || 0) : 0;

        if (remoteVersion > localVersion) {
          console.log(`🔄 تحديث جديد متاح: v\( {localVersion} → v \){remoteVersion}`);
          await this.saveNewData(remoteData);
        } else {
          console.log("✅ البيانات محدثة");
        }
      } catch (e) {
        console.warn("⚠️ فشل التحقق من التحديث", e);
      }
    },

    async saveNewData(remoteData) {
      try {
        const processed = {
          version: remoteData.version || Date.now(),
          lastUpdated: Date.now(),
          recipes: (remoteData.recipes || remoteData).map((r, i) => ({
            ...r,
            id: r.id || `r_${i+1}`
          }))
        };

        localStorage.setItem(App.CONFIG.DATA_KEY, JSON.stringify(processed));
        localStorage.setItem(App.CONFIG.LAST_UPDATE_KEY, Date.now().toString());

        App.recipes = processed.recipes;
        App.UI.renderRecipes(App.recipes);

        console.log("✅ تم تحديث قاعدة البيانات بنجاح");
      } catch (e) {
        console.error("فشل حفظ التحديث:", e);
      }
    }
  },

  // ======================= UI =======================
  UI: {
    renderRecipes(recipes) {
      const container = document.getElementById("recipesList");
      if (!recipes || recipes.length === 0) {
        container.innerHTML = `<div class="empty-state">لم يتم العثور على وصفات</div>`;
        return;
      }

      container.innerHTML = recipes.map(recipe => `
        <div class="recipe-item" onclick="App.showRecipe('${recipe.id}')">
          <div class="recipe-name">${App.Utils.escape(recipe.name)}</div>
          <div style="font-size:13.5px; color:#555;">
            ⏱ ${recipe.time_minutes || '?'} دقيقة • ${App.getDifficultyLabel(recipe.difficulty)}
          </div>
        </div>
      `).join('');
    },

    switchTab(tab) {
      App.currentTab = tab;
      document.getElementById("detailsPanel").style.display = tab === 0 ? "block" : "none";
      document.getElementById("chatPanel").style.display = tab === 1 ? "flex" : "none";

      document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === tab));
    },

    addChatMessage(text, type) {
      const container = document.getElementById("chatMessages");
      const div = document.createElement("div");
      div.className = `message ${type}-message`;
      div.innerHTML = type === "bot" ? text : App.Utils.escape(text);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  },

  // ======================= Chat =======================
  Chat: {
    send() {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;

      App.UI.addChatMessage(text, "user");
      input.value = "";

      setTimeout(() => {
        const reply = this.generateReply(text);
        App.UI.addChatMessage(reply, "bot");
      }, 700);
    },

    generateReply(text) {
      const lower = text.toLowerCase();
      if (/^(اهلا|مرحبا|سلام|هاي)/.test(lower)) return "أهلاً يا صاحبي! 👋 عايز نعمل إيه النهاردة؟";
      if (/جوعان|جعان/.test(lower)) return "يا نهار أسود! جوعان وبتكلمني؟ قولي عايز إيه.";
      if (/ههه|مزاح/.test(lower)) return "ههههه يا وحش، أنت بتضحك عليا؟ 😂";
      return "قولي اسم الأكلة يا صاحبي وأنا أجيبلك الوصفة.";
    }
  },

  // ======================= Utils =======================
  Utils: {
    escape(str) {
      if (typeof str !== "string") return "";
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }
  },

  getDifficultyLabel(diff) {
    const map = { easy: "🟢 سهل", medium: "🟠 متوسط", hard: "🔴 صعب" };
    return map[diff] || diff;
  },

  showRecipe(id) {
    this.currentRecipe = this.recipes.find(r => r.id === id);
    if (!this.currentRecipe) return;

    let html = `
      <h2>${this.Utils.escape(this.currentRecipe.name)}</h2>
      <p><strong>الوقت:</strong> ${this.currentRecipe.time_minutes || '?'} دقيقة</p>
      <p><strong>الصعوبة:</strong> ${this.getDifficultyLabel(this.currentRecipe.difficulty)}</p>

      <h3 style="margin:25px 0 12px;">المقادير</h3>
      <ul style="padding-right:25px;">
        ${(this.currentRecipe.ingredients || []).map(i => `
          <li>${this.Utils.escape(i.item)} — ${i.amount || ''} ${i.unit || ''}</li>
        `).join('')}
      </ul>
    `;

    document.getElementById("detailsPanel").innerHTML = html;
    this.UI.switchTab(0);
  },

  // ======================= Search =======================
  Search: {
    timeout: null,
    handle(e) {
      clearTimeout(this.timeout);
      this.timeout = setTimeout(() => {
        const term = e.target.value.toLowerCase().trim();
        let results = App.recipes || [];

        if (term) {
          results = results.filter(r => 
            (r.name || "").toLowerCase().includes(term)
          );
        }
        App.UI.renderRecipes(results);
      }, 280);
    }
  }
};

// ======================= بدء التطبيق =======================
window.onload = () => {
  App.Data.init();
};
</script>

</body>
</html>
